server {
    listen 8080;
    root YoupiBanane;
	server_name 42Paris;
	error_page 400 /errors/400.html;
	client_max_body_size 100;
	
	location /post_body {
		root YoupiBanane/;
		allow_methods POST;
		index youpi.bad_extension;
	}
	
	location /nop {
		root YoupiBanane/nop;
		allow_methods GET;
		index youpi.bad_extension;
	}

	location /Yeah {
		root YoupiBanane/Yeah;
		allow_methods GET;
		index youpi.bad_extension;
	}
	
	location /directory {
		alias YoupiBanane;
		index youpi.bad_extension;
		allow_methods GET POST;
		cgi {
			allow_methods POST;
			cgi_extension .bla;
			cgi_pass cgi_tester;
		}
	}

	location / {
		allow_methods GET;
		autoindex on;
		cgi {
			cgi_extension .bla;
			cgi_pass cgi_tester;
		}
	}
}
