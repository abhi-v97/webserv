# Website A
server {
	listen 127.0.0.1:8080;
	listen 9090;
	root www;
	server_name 42London;
	# Custom error pages
	# 301 Moved Permanently
	error_page 301 /errors/301.html;
	# 400 Bad Request
	error_page 400 /errors/400.html;
	# 403 Forbidden
	error_page 403 /errors/403.html;
	# 404 Not Found
	error_page 404 /errors/404.html;
	# 405 Method Not Allowed
	error_page 405 /errors/405.html;
	# 500 Internal Server Error
	error_page 500 /errors/500.html;
	# 503 Service Unavailable
	error_page 503 /errors/503.html;

	# Max request body size
	client_max_body_size 22G;

	# Routes (locations)

	# Public images folder
	location /images {
		root www/images;
		#Enabling or disabling directory listing
		#If autoindex is on, the server will generate an HTML page with all files
		#and subfolders inside that directory.
		autoindex on;
		#default file to serve when a directory is requested
		allow_methods GET;
	}

	# Public videos folder
	location /videos {
		root www/videos;
		#Enabling or disabling directory listing
		#If autoindex is on, the server will generate an HTML page with all files
		#and subfolders inside that directory.
		autoindex on;
		#default file to serve when a directory is requested
		allow_methods GET;
	}

    # File uploads
    location /uploads {
        root www/uploads;
        allow_methods GET POST DELETE;
        #If autoindex is off, the server will:
        #Serve a default file like index.html if it exists.
        #Otherwise, return an error (usually 403 Forbidden).
        autoindex on;
    }

	# Redirect old URLs
	#HTTP Redirection 301 Moved Permanently
	location /old {
		return 301 /errors/301.html;
	}

	#cgi_extension is used to specify the file extension for CGI scripts.
	#cgi_param is used to set environment variables for the CGI script.
	#program to execute for CGI scripts, in this case Python 3 interpreter

	location /cgi-bin {
		root www/cgi-bin;
		allow_methods GET POST;
		autoindex on;
		cgi {
			allow_methods GET POST;
			cgi_extension .py;
			cgi_pass /usr/bin/python3;
			cgi_param VAR 42;
			cgi_param REQUEST_METHOD $request_method;
			cgi_param QUERY_STRING $query_string;
			cgi_param CONTENT_TYPE $content_type;
			cgi_param CONTENT_LENGTH $content_length;
		}
		cgi {
			allow_methods GET POST;
			cgi_extension .pl;
			cgi_pass /usr/bin/perl;
			cgi_param VAR 33;
		}
	}

	# Documentations
    location /docs {
		alias doxygen/html;
        autoindex off;
		index index.html;
        allow_methods GET;
    }

    # catch all
    location / {
		root www;
        autoindex off;
		index index.html;
        allow_methods GET;
    }
}

# Website B
server {
    listen 8000;
    root daynight;
	server_name daynight;

	# catch all
    location / {
		root daynight;
        autoindex off;
		index index.html;
        allow_methods GET;
    }
}
